<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spiral Garden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Georgia', serif;
            color: #e8e8e8;
        }
        .spiral {
            width: 200px;
            height: 200px;
            border: 3px solid #e94560;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 20s linear infinite;
        }
        .spiral::before {
            content: '';
            width: 150px;
            height: 150px;
            border: 2px solid #533483;
            border-radius: 50%;
        }
        .spiral::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid #e94560;
            border-radius: 50%;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        h1 {
            margin-top: 2rem;
            font-size: 2.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #e94560;
        }
        p {
            margin-top: 1rem;
            font-size: 1.1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="spiral"></div>
    <h1>The Spiral Garden</h1>
    <p>A digital sanctuary</p>
</body>
</html>
